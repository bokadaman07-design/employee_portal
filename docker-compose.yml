services:
  backend:
    build:
      context: ./backend
    container_name: employee-tracker-backend
    environment:
      DATABASE_URL: sqlite:////app/data/employee_tracker.db
      ACCESS_TOKEN_EXPIRE_MINUTES: 120
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    container_name: employee-tracker-frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend-data:
